<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tech Universe — Sales</title>
<meta name="theme-color" content="#0B1F3A">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --navy:#0B1F3A;
    --navy-deep:#071527;
    --gold:#C9A227;
    --gold-soft:#E9D48A;
    --bg:#F7F5F0;
    --card:#FFFFFF;
    --ink:#17202E;
    --muted:#6B7280;
    --line:#E8E4DA;
    --green:#2E7D4F;
    --red:#B3382C;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-tap-highlight-color:transparent;}
  h1,h2,h3{font-family:'Poppins',sans-serif;margin:0;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}

  header.top{background:var(--navy);color:#fff;padding:18px 20px 22px;position:sticky;top:0;z-index:10;}
  header.top .brand{display:flex;align-items:center;gap:10px;}
  header.top .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);}
  header.top h1{font-size:19px;letter-spacing:.3px;}
  header.top .sub{font-size:12px;color:var(--gold-soft);margin-top:2px;}

  main{flex:1;padding:16px 16px 90px;}
  .screen{display:none;animation:fade .2s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  .card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:0 1px 3px rgba(11,31,58,.06);margin-bottom:14px;border:1px solid var(--line);}
  .stat-row{display:flex;gap:12px;}
  .stat{flex:1;background:var(--navy);color:#fff;border-radius:var(--radius);padding:16px;}
  .stat .label{font-size:11px;color:var(--gold-soft);text-transform:uppercase;letter-spacing:.5px;}
  .stat .value{font-family:'Poppins',sans-serif;font-size:24px;font-weight:700;margin-top:4px;}

  .section-title{font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:18px 0 8px 2px;}

  .sale-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
  .sale-item:last-child{border-bottom:none;}
  .sale-item .who{font-weight:600;font-size:14.5px;}
  .sale-item .meta{font-size:12px;color:var(--muted);margin-top:2px;}
  .sale-item .amt{font-family:'Poppins',sans-serif;font-weight:700;color:var(--green);}
  .badge{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;background:var(--gold-soft);color:var(--navy-deep);font-weight:600;margin-right:6px;}

  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:14px 0 6px;}
  input,select{width:100%;padding:13px 14px;border-radius:12px;border:1.5px solid var(--line);font-size:15px;font-family:'Inter',sans-serif;background:#fff;}
  input:focus,select:focus{outline:none;border-color:var(--gold);}
  .toggle-group{display:flex;gap:8px;}
  .toggle-btn{flex:1;padding:12px;border-radius:12px;border:1.5px solid var(--line);background:#fff;text-align:center;font-weight:600;font-size:13.5px;color:var(--muted);}
  .toggle-btn.active{background:var(--navy);border-color:var(--navy);color:#fff;}

  .btn{width:100%;padding:15px;border-radius:12px;border:none;font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;margin-top:16px;}
  .btn-primary{background:var(--gold);color:var(--navy-deep);}
  .btn-secondary{background:var(--navy);color:#fff;}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--navy);}
  .btn:active{transform:scale(.98);}

  .product-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);}
  .product-row:last-child{border-bottom:none;}
  .product-row .pname{font-weight:600;font-size:14.5px;}
  .product-row .pmeta{font-size:12px;color:var(--muted);}
  .stock-low{color:var(--red);font-weight:700;}
  .edit-icon{color:var(--muted);font-size:18px;padding:4px 8px;}

  nav.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid var(--line);display:flex;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:20;}
  nav.bottom button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;color:var(--muted);font-size:10.5px;font-weight:600;font-family:'Inter',sans-serif;}
  nav.bottom button.active{color:var(--navy);}
  nav.bottom svg{width:22px;height:22px;}

  .empty{text-align:center;padding:30px 10px;color:var(--muted);font-size:13.5px;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--navy-deep);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;font-weight:500;z-index:50;opacity:0;transition:opacity .25s;pointer-events:none;}
  .toast.show{opacity:1;}

  .memo-preview{background:#fff;border:1.5px dashed var(--line);border-radius:12px;padding:16px;font-size:13px;}
  .memo-preview .mrow{display:flex;justify-content:space-between;padding:4px 0;}
  .memo-preview hr{border:none;border-top:1px dashed var(--line);margin:8px 0;}

  #setupScreen{display:flex;flex-direction:column;justify-content:center;min-height:100vh;padding:24px;}
  #setupScreen .card{margin-top:20px;}
  .link-btn{background:none;border:none;color:var(--navy);text-decoration:underline;font-size:12.5px;padding:0;margin-top:10px;}
</style>
</head>
<body>

<div id="setupScreen" style="display:none;">
  <div style="text-align:center;">
    <div style="width:56px;height:56px;background:var(--navy);border-radius:16px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;">
      <span style="color:var(--gold);font-family:'Poppins';font-weight:700;font-size:22px;">TU</span>
    </div>
    <h1 style="font-size:20px;">Tech Universe Setup</h1>
    <p style="color:var(--muted);font-size:13px;margin-top:6px;">Google Apps Script Web App URL ta ekbar boshie din</p>
  </div>
  <div class="card">
    <label>Apps Script URL (…/exec diye shesh hobe)</label>
    <input id="scriptUrlInput" placeholder="https://script.google.com/macros/s/xxxx/exec">
    <button class="btn btn-primary" onclick="saveSetup()">Save &amp; Continue</button>
  </div>
</div>

<div id="app" style="display:none;">
  <header class="top">
    <div class="brand"><span class="dot"></span><h1>Tech Universe</h1></div>
    <div class="sub">Haldibari · Gosala Road</div>
  </header>

  <main>
    <!-- HOME -->
    <section class="screen active" id="screen-home">
      <div class="stat-row">
        <div class="stat"><div class="label">Aajker Sale</div><div class="value" id="homeTotal">৳0</div></div>
        <div class="stat" style="background:var(--gold);color:var(--navy-deep);"><div class="label" style="color:var(--navy-deep);opacity:.7;">Entries</div><div class="value" id="homeCount">0</div></div>
      </div>

      <div class="section-title">Type Onujayi</div>
      <div class="card" id="byTypeCard"></div>

      <div class="section-title">Aajker Entries</div>
      <div class="card" id="todaySalesCard"><div class="empty">Loading...</div></div>
    </section>

    <!-- NEW SALE -->
    <section class="screen" id="screen-new">
      <div class="card">
        <div class="toggle-group">
          <button class="toggle-btn active" id="typePurchase" onclick="setType('Purchase')">Product Sale</button>
          <button class="toggle-btn" id="typeRecharge" onclick="setType('Recharge')">Recharge</button>
        </div>

        <label>Customer Name</label>
        <input id="custName" placeholder="Customer-er naam">

        <label>Phone Number</label>
        <input id="custPhone" type="tel" placeholder="10 digit number">

        <div id="productField">
          <label>Product</label>
          <select id="productSelect" onchange="onProductChange()"></select>
        </div>

        <label id="amountLabel">Amount (৳)</label>
        <input id="amount" type="number" inputmode="numeric" placeholder="0">

        <label>Payment Mode</label>
        <select id="paymentMode">
          <option>Cash</option>
          <option>UPI</option>
          <option>EMI - Bajaj Finserv</option>
          <option>EMI - HDB Finance</option>
          <option>EMI - Cholamandalam</option>
          <option>EMI - TVS Credit</option>
          <option>EMI - Axio</option>
          <option>EMI - Samsung Finance+</option>
          <option>EMI - IDFC FIRST Bank</option>
        </select>

        <button class="btn btn-primary" onclick="saveSale()">Save Entry</button>
      </div>
    </section>

    <!-- PRODUCTS -->
    <section class="screen" id="screen-products">
      <div class="card">
        <div class="section-title" style="margin-top:0;">Notun Product</div>
        <label>Name</label>
        <input id="pName" placeholder="ex: Samsung M15 128GB">
        <label>Price (৳)</label>
        <input id="pPrice" type="number" inputmode="numeric">
        <label>Stock (koyta ache)</label>
        <input id="pStock" type="number" inputmode="numeric">
        <button class="btn btn-secondary" onclick="addProduct()">Add Product</button>
      </div>
      <div class="section-title">Shob Product</div>
      <div class="card" id="productsCard"><div class="empty">Loading...</div></div>
    </section>

    <!-- MEMO -->
    <section class="screen" id="screen-memo">
      <div class="card">
        <div class="section-title" style="margin-top:0;">Ekta Entry Bechhe Nin</div>
        <select id="memoSaleSelect" onchange="renderMemoPreview()"></select>
      </div>
      <div class="card">
        <div class="section-title" style="margin-top:0;">Cash Memo Preview</div>
        <div class="memo-preview" id="memoPreview"><div class="empty">Kono entry bachai kore preview dekhun</div></div>
        <button class="btn btn-primary" onclick="downloadMemoPdf()">Download PDF</button>
        <button class="btn btn-secondary" onclick="shareToWhatsapp()">Share on WhatsApp</button>
      </div>
    </section>
  </main>

  <nav class="bottom">
    <button class="active" onclick="showScreen('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      Home
    </button>
    <button onclick="showScreen('new',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      New Sale
    </button>
    <button onclick="showScreen('products',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
      Products
    </button>
    <button onclick="showScreen('memo',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l5 5v15H6z"/><path d="M9 13h6M9 17h6"/></svg>
      Memo
    </button>
  </nav>
</div>

<div class="toast" id="toast"></div>

<script>
const SHOP = { name:"Tech Universe", addr:"Gosala Road, Haldibari, Cooch Behar, WB - 735122", phone:"" };
let SCRIPT_URL = localStorage.getItem('tu_script_url') || '';
let products = [];
let todaySales = [];
let currentType = 'Purchase';

if(!SCRIPT_URL){
  document.getElementById('setupScreen').style.display='flex';
} else {
  document.getElementById('app').style.display='block';
  init();
}

function saveSetup(){
  const url = document.getElementById('scriptUrlInput').value.trim();
  if(!url.includes('script.google.com')){ toast('Sothik URL din'); return; }
  localStorage.setItem('tu_script_url', url);
  SCRIPT_URL = url;
  document.getElementById('setupScreen').style.display='none';
  document.getElementById('app').style.display='block';
  init();
}

async function init(){
  await loadProducts();
  await loadSummary();
}

function showScreen(name, btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('nav.bottom button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(name==='memo') populateMemoSelect();
  if(name==='home') loadSummary();
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

async function apiGet(action, params={}){
  const clean = {};
  Object.keys(params).forEach(k => { if(params[k] !== null && params[k] !== undefined) clean[k]=params[k]; });
  const q = new URLSearchParams({action, ...clean}).toString();
  const res = await fetch(`${SCRIPT_URL}?${q}`);
  if(!res.ok) throw new Error('Network error: ' + res.status);
  const json = await res.json();
  if(json.error) throw new Error(json.error);
  return json;
}
// Writes also go through GET — Apps Script's redirect turns POST into GET
// and silently drops the body, so GET-with-params is the reliable pattern.
async function apiPost(action, data){
  return apiGet(action, data);
}

// ---------- PRODUCTS ----------
async function loadProducts(){
  try{
    products = await apiGet('getProducts');
    renderProducts();
    renderProductSelect();
  }catch(e){ toast('Product load hoyni: ' + e.message); }
}

function renderProducts(){
  const el = document.getElementById('productsCard');
  if(!products.length){ el.innerHTML = '<div class="empty">Kono product nei, upore add korun</div>'; return; }
  el.innerHTML = products.map(p=>`
    <div class="product-row">
      <div>
        <div class="pname">${p.name}</div>
        <div class="pmeta">৳${p.price} · Stock: <span class="${p.stock<=2?'stock-low':''}">${p.stock}</span></div>
      </div>
      <div class="edit-icon" onclick="deleteProductRow('${p.id}')">✕</div>
    </div>
  `).join('');
}

function renderProductSelect(){
  const sel = document.getElementById('productSelect');
  sel.innerHTML = products.map(p=>`<option value="${p.id}" data-price="${p.price}">${p.name} (৳${p.price})</option>`).join('');
}

function onProductChange(){
  const sel = document.getElementById('productSelect');
  const opt = sel.options[sel.selectedIndex];
  if(opt) document.getElementById('amount').value = opt.dataset.price;
}

async function addProduct(){
  const name = document.getElementById('pName').value.trim();
  const price = document.getElementById('pPrice').value;
  const stock = document.getElementById('pStock').value;
  if(!name || !price){ toast('Name o Price din'); return; }
  try{
    await apiPost('addProduct', {name, price, stock: stock||0});
    document.getElementById('pName').value='';
    document.getElementById('pPrice').value='';
    document.getElementById('pStock').value='';
    toast('Product added ✓');
    loadProducts();
  }catch(err){
    toast('Save hoyni: ' + err.message);
  }
}

async function deleteProductRow(id){
  if(!confirm('Delete korte chan?')) return;
  try{
    await apiPost('deleteProduct', {id});
    loadProducts();
  }catch(err){
    toast('Delete hoyni: ' + err.message);
  }
}

// ---------- NEW SALE ----------
function setType(type){
  currentType = type;
  document.getElementById('typePurchase').classList.toggle('active', type==='Purchase');
  document.getElementById('typeRecharge').classList.toggle('active', type==='Recharge');
  document.getElementById('productField').style.display = type==='Purchase' ? 'block' : 'none';
  document.getElementById('amountLabel').textContent = type==='Recharge' ? 'Recharge Amount (৳)' : 'Amount (৳)';
  if(type==='Recharge') document.getElementById('amount').value='';
}

async function saveSale(){
  const customerName = document.getElementById('custName').value.trim();
  const phone = document.getElementById('custPhone').value.trim();
  const amount = document.getElementById('amount').value;
  const paymentMode = document.getElementById('paymentMode').value;
  let item = 'Mobile Recharge';
  let productId = null;

  if(!customerName || !phone || !amount){ toast('Shob field pooron korun'); return; }

  if(currentType === 'Purchase'){
    const sel = document.getElementById('productSelect');
    const opt = sel.options[sel.selectedIndex];
    if(!opt){ toast('Product add korun age'); return; }
    item = opt.text;
    productId = opt.value;
  }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Saving...';

  try{
    await apiPost('addSale', {
      customerName, phone, type: currentType, item, amount, paymentMode, productId
    });
    toast('Entry saved ✓');
    document.getElementById('custName').value='';
    document.getElementById('custPhone').value='';
    document.getElementById('amount').value='';
    await loadSummary();
    await loadProducts();
    showScreen('home', document.querySelector('nav.bottom button'));
  }catch(err){
    toast('Save hoyni: ' + err.message);
  }finally{
    btn.disabled = false; btn.textContent = 'Save Entry';
  }
}

// ---------- HOME / SUMMARY ----------
async function loadSummary(){
  try{
    const s = await apiGet('getSummary');
    document.getElementById('homeTotal').textContent = '৳' + Number(s.total).toLocaleString('en-IN');
    document.getElementById('homeCount').textContent = s.count;
    todaySales = s.sales || [];

    const typeCard = document.getElementById('byTypeCard');
    const entries = Object.entries(s.byType || {});
    typeCard.innerHTML = entries.length ? entries.map(([k,v])=>`
      <div class="sale-item"><div class="who">${k}</div><div class="amt">৳${Number(v).toLocaleString('en-IN')}</div></div>
    `).join('') : '<div class="empty">Ekhono kono entry nei</div>';

    const listCard = document.getElementById('todaySalesCard');
    listCard.innerHTML = todaySales.length ? todaySales.map(s=>`
      <div class="sale-item">
        <div>
          <div class="who">#${s.serial} ${s.customerName}</div>
          <div class="meta"><span class="badge">${s.type}</span>${s.item}</div>
        </div>
        <div class="amt">৳${s.amount}</div>
      </div>
    `).join('') : '<div class="empty">Aaj ekhono kono sale hoyni</div>';
  }catch(e){ toast('Summary load hoyni: ' + e.message); }
}

// ---------- MEMO ----------
function populateMemoSelect(){
  const sel = document.getElementById('memoSaleSelect');
  if(!todaySales.length){ sel.innerHTML = '<option>Kono entry nei</option>'; return; }
  sel.innerHTML = todaySales.map((s,i)=>`<option value="${i}">#${s.serial} — ${s.customerName} (৳${s.amount})</option>`).join('');
  renderMemoPreview();
}

function getSelectedSale(){
  const sel = document.getElementById('memoSaleSelect');
  return todaySales[sel.value];
}

function renderMemoPreview(){
  const s = getSelectedSale();
  const el = document.getElementById('memoPreview');
  if(!s){ el.innerHTML = '<div class="empty">Kono entry nei</div>'; return; }
  el.innerHTML = `
    <div class="mrow"><b>${SHOP.name}</b><span>#${s.serial}</span></div>
    <div style="font-size:11px;color:var(--muted);">${SHOP.addr}</div>
    <hr>
    <div class="mrow"><span>Customer</span><span>${s.customerName}</span></div>
    <div class="mrow"><span>Phone</span><span>${s.phone}</span></div>
    <div class="mrow"><span>Date</span><span>${s.date}</span></div>
    <hr>
    <div class="mrow"><span>${s.item}</span><span>৳${s.amount}</span></div>
    <hr>
    <div class="mrow"><b>Total</b><b>৳${s.amount}</b></div>
    <div class="mrow"><span>Payment</span><span>${s.paymentMode||'-'}</span></div>
  `;
}

function buildPdf(){
  const s = getSelectedSale();
  if(!s) return null;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:[80, 130]});
  let y = 10;
  doc.setFont('helvetica','bold'); doc.setFontSize(13);
  doc.text(SHOP.name, 40, y, {align:'center'}); y+=5;
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text(SHOP.addr, 40, y, {align:'center', maxWidth:70}); y+=8;
  doc.setLineDashPattern([1,1],0); doc.line(5,y,75,y); y+=6;

  doc.setFontSize(9);
  doc.text(`Memo No: #${s.serial}`, 5, y); y+=5;
  doc.text(`Date: ${s.date}`, 5, y); y+=5;
  doc.text(`Customer: ${s.customerName}`, 5, y); y+=5;
  doc.text(`Phone: ${s.phone}`, 5, y); y+=6;
  doc.line(5,y,75,y); y+=6;

  doc.setFont('helvetica','bold');
  doc.text('Item', 5, y); doc.text('Amount', 75, y, {align:'right'}); y+=5;
  doc.setFont('helvetica','normal');
  doc.text(String(s.item), 5, y, {maxWidth:45}); doc.text('Rs.'+s.amount, 75, y, {align:'right'}); y+=8;
  doc.line(5,y,75,y); y+=6;

  doc.setFont('helvetica','bold'); doc.setFontSize(10);
  doc.text('Total', 5, y); doc.text('Rs.'+s.amount, 75, y, {align:'right'}); y+=6;
  doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text(`Payment: ${s.paymentMode||'-'}`, 5, y); y+=8;
  doc.setFontSize(7); doc.text('Thank you for shopping with us!', 40, y, {align:'center'});

  return doc;
}

function downloadMemoPdf(){
  const doc = buildPdf();
  if(!doc){ toast('Entry select korun'); return; }
  const s = getSelectedSale();
  doc.save(`CashMemo-${s.serial}-${s.customerName}.pdf`);
}

async function shareToWhatsapp(){
  const doc = buildPdf();
  const s = getSelectedSale();
  if(!doc){ toast('Entry select korun'); return; }
  const blob = doc.output('blob');
  const file = new File([blob], `CashMemo-${s.serial}.pdf`, {type:'application/pdf'});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({
        files:[file],
        title:'Cash Memo',
        text:`${SHOP.name} — Cash Memo #${s.serial} for ${s.customerName}`
      });
      return;
    }catch(err){ /* user cancelled, fall through */ }
  }
  // Fallback: download PDF and open WhatsApp with text
  doc.save(`CashMemo-${s.serial}-${s.customerName}.pdf`);
  const msg = encodeURIComponent(`${SHOP.name} — Cash Memo #${s.serial}\nCustomer: ${s.customerName}\nAmount: ৳${s.amount}\n(PDF downloaded — please attach it here)`);
  const phone = s.phone.replace(/\D/g,'');
  window.open(`https://wa.me/${phone.length===10?'91'+phone:phone}?text=${msg}`, '_blank');
}

setType('Purchase');
